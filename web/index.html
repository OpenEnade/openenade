<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Ranking real das universidades brasileiras com base na nota continua do ENADE" />
    <title>OpenEnade - Ranking real das universidades brasileiras</title>
  </head>
  <body>
    <script>
      // Apply theme before first paint to avoid flash
      (function() {
        var theme = localStorage.getItem('openenade-theme') || 'dark';
        if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
